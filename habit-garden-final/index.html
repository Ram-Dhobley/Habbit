<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Habit Garden">
  <meta name="theme-color" content="#2e7d32">
  <meta name="description" content="Grow habits, grow plants.">
  <title>Habit Garden</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

<div id="auth-screen-mount"></div>

<div id="main-app" style="display:none;flex-direction:column;height:100dvh;height:100vh;">
  <div style="height:env(safe-area-inset-top,0px);background:var(--bg);flex-shrink:0"></div>
  <div id="screen-container" class="content-area"></div>
  <nav class="bnav">
    <button class="ni on" id="ni-home" onclick="HG.nav.go('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </button>
    <button class="ni" id="ni-feed" onclick="HG.nav.go('feed')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
    <div class="fab-ni">
      <div class="fab" onclick="HG.screens.addHabit.open()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
    </div>
    <button class="ni" id="ni-msgs" onclick="HG.nav.go('msgs')" style="position:relative">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <div class="nav-dot" id="msgs-nav-dot" style="display:none"></div>
    </button>
    <button class="ni" id="ni-profile" onclick="HG.nav.go('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
  </nav>
</div>

<script>window.HG = {}; HG.screens = {};</script>
<script src="/js/data.js"></script>
<script src="/js/screens/home.js"></script>
<script src="/js/screens/feed.js"></script>
<script src="/js/screens/notifs-msgs-profile.js"></script>
<script src="/js/screens/overlays.js"></script>
<script src="/js/app.js"></script>

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect,
         getRedirectResult, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey:            "AIzaSyCRy0DzkHNWhzDY1_L1fJXvQ1JN4zEzEjI",
  authDomain:        "habit-garden-437eb.firebaseapp.com",
  projectId:         "habit-garden-437eb",
  storageBucket:     "habit-garden-437eb.firebasestorage.app",
  messagingSenderId: "619675249259",
  appId:             "1:619675249259:web:fe476b4db6b53aa0a2df2e",
  measurementId:     "G-XMQ256SFZX"
};

const fbApp    = initializeApp(firebaseConfig);
const auth     = getAuth(fbApp);
const db       = getFirestore(fbApp);
const storage  = getStorage(fbApp);
const provider = new GoogleAuthProvider();

window.FB = {
  signInGoogle: async () => {
    if (/Mobi|Android/i.test(navigator.userAgent)) {
      await signInWithRedirect(auth, provider);
    } else {
      return (await signInWithPopup(auth, provider)).user;
    }
  },
  handleRedirectResult: () => getRedirectResult(auth),
  signOutUser:          () => signOut(auth),
  onAuth:               cb => onAuthStateChanged(auth, cb),

  getOrCreateUser: async (u) => {
    const ref  = doc(db, 'users', u.uid);
    const snap = await getDoc(ref);
    if (snap.exists()) return snap.data();
    const profile = {
      uid:      u.uid,
      name:     u.displayName || 'Habit Grower',
      email:    u.email,
      photoURL: u.photoURL || null,
      handle:   '@' + (u.email?.split('@')[0] || 'user'),
      city: '', country: '', bio: '', quote: '',
      peers: 0, following: 0, followers: 0, trybes: 0,
      stats: { daysDone:0, bestStreak:0, consistency:0,
               plants:0, avgStreak:0, weeksActive:0 },
      createdAt: serverTimestamp()
    };
    await setDoc(ref, profile);
    return profile;
  }
};

// ── Auth screen ──────────────────────────────────────────────
document.getElementById('auth-screen-mount').innerHTML = `
  <div id="auth-screen" style="
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;min-height:100dvh;min-height:100vh;
    padding:48px 32px;text-align:center;background:var(--bg);">

    <div style="font-size:80px;margin-bottom:16px;line-height:1">🌿</div>

    <div style="font-family:'Fraunces',serif;font-size:32px;font-weight:700;
                color:#1b5e20;margin-bottom:8px;line-height:1.1">
      Habit Garden
    </div>

    <div style="font-size:15px;color:#a8a39a;margin-bottom:56px;line-height:1.7">
      Grow habits.<br>Watch your garden come alive.
    </div>

    <button id="signin-btn" onclick="window._doSignIn()" style="
      display:flex;align-items:center;justify-content:center;gap:12px;
      width:100%;max-width:300px;
      background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:14px;
      padding:16px 24px;font-size:15px;font-weight:500;
      font-family:'DM Sans',sans-serif;color:#1c1c1e;cursor:pointer;">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.5-1.45-.79-3-.79-4.59s.29-3.14.79-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.55 10.78l7.98-6.19z"/>
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.55 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      </svg>
      Continue with Google
    </button>

    <div style="font-size:11px;color:#c0bbb4;margin-top:36px;line-height:1.7;max-width:260px">
      Your habits are private by default.<br>
      No card required.
    </div>
  </div>`;

window._doSignIn = async () => {
  const btn = document.getElementById('signin-btn');
  btn.textContent = 'Signing in…';
  btn.disabled = true;
  try {
    await window.FB.signInGoogle();
  } catch(e) {
    btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 48 48">
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.5-1.45-.79-3-.79-4.59s.29-3.14.79-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.55 10.78l7.98-6.19z"/>
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.55 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
    </svg> Continue with Google`;
    btn.disabled = false;
  }
};

// Handle redirect result when returning from Google on mobile
window.FB.handleRedirectResult().catch(() => {});

// ── Auth state — boots the app when signed in ─────────────────
window.FB.onAuth(async (user) => {
  if (user) {
    const profile = await window.FB.getOrCreateUser(user);
    HG.data.user.name    = profile.name    || user.displayName || 'Habit Grower';
    HG.data.user.handle  = profile.handle  || '@user';
    HG.data.user.bio     = profile.bio     || 'Runner · Reader · Meditator';
    HG.data.user.quote   = profile.quote   || '"Discipline is choosing between what you want now and what you want most."';
    document.getElementById('auth-screen').style.display    = 'none';
    document.getElementById('main-app').style.display       = 'flex';
    if (typeof init === 'function') init();
  } else {
    const as = document.getElementById('auth-screen');
    if (as) as.style.display = 'flex';
    document.getElementById('main-app').style.display = 'none';
  }
});
</script>

</body>
</html>
