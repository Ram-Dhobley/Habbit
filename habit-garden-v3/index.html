<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Habit Garden">
  <meta name="theme-color" content="#2e7d32">
  <title>Habit Garden</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/app.css">
</head>

<body>

  <!-- Auth screen shown while signed out -->
  <div id="auth-wrap"></div>

  <!-- Main app shown once signed in -->
  <div id="main-app" style="display:none;flex-direction:column;height:100dvh;height:100vh;">
    <div style="height:env(safe-area-inset-top,0px);background:var(--bg);flex-shrink:0"></div>
    <div id="screen-container" class="content-area"></div>
    <nav class="bnav">
      <button class="ni on" id="ni-home" onclick="HG.nav.go('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </button>
      <button class="ni" id="ni-feed" onclick="HG.nav.go('feed')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
        </svg>
      </button>
      <div class="fab-ni">
        <div class="fab" onclick="HG.screens.addHabit.open()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" width="20" height="20"
            color="#fff">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </div>
      </div>
      <button class="ni" id="ni-msgs" onclick="HG.nav.go('msgs')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
        </svg>
      </button>
      <button class="ni" id="ni-profile" onclick="HG.nav.go('profile')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </button>
    </nav>
  </div>

  <!-- App scripts -->
  <script>window.HG = window.HG || {}; HG.screens = HG.screens || {};</script>
  <script src="/js/data.js"></script>
  <script type="module" src="/js/db.js"></script>
  <script src="/js/screens/home.js"></script>
  <script src="/js/screens/feed.js"></script>
  <script src="/js/screens/notifs-msgs-profile.js"></script>
  <script src="/js/screens/overlays.js"></script>
  <script src="/js/app.js"></script>

  <!-- Firebase + boot -->
  <script type="module">
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect,
      getRedirectResult, onAuthStateChanged, signOut
    }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    // ── YOUR FIREBASE CONFIG ──────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyCRy0DzkHNWhzDY1_L1fJXvQ1JN4zEzEjI",
      authDomain: "habit-garden-437eb.firebaseapp.com",
      projectId: "habit-garden-437eb",
      storageBucket: "habit-garden-437eb.firebasestorage.app",
      messagingSenderId: "619675249259",
      appId: "1:619675249259:web:fe476b4db6b53aa0a2df2e",
      measurementId: "G-XMQ256SFZX"
    };
    // ─────────────────────────────────────────────────────────────

    const fbApp = initializeApp(firebaseConfig);
    const auth = getAuth(fbApp);
    const db = getFirestore(fbApp);
    const storage = getStorage(fbApp);
    const provider = new GoogleAuthProvider();

    // Expose sign-out globally so profile screen can call it
    window.FB = {
      db: db,
      signOutUser: () => signOut(auth)
    };

    // ── AUTH SCREEN ───────────────────────────────────────────────
    function showAuthScreen() {
      document.getElementById('main-app').style.display = 'none';
      document.getElementById('auth-wrap').innerHTML = `
  <div id="auth-screen" style="
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;min-height:100dvh;min-height:100vh;
    padding:48px 32px;text-align:center;background:var(--bg);">
    <div style="font-size:80px;margin-bottom:16px;line-height:1">🌿</div>
    <div style="font-family:'Fraunces',serif;font-size:32px;font-weight:700;color:#1b5e20;margin-bottom:8px">
      Habit Garden
    </div>
    <div style="font-size:15px;color:#a8a39a;margin-bottom:52px;line-height:1.7">
      Grow habits.<br>Watch your garden come alive.
    </div>
    <button id="signin-btn" style="
      display:flex;align-items:center;justify-content:center;gap:12px;
      width:100%;max-width:300px;background:#fff;
      border:0.5px solid rgba(0,0,0,.1);border-radius:14px;
      padding:16px 24px;font-size:15px;font-weight:500;
      font-family:'DM Sans',sans-serif;color:#1c1c1e;cursor:pointer;">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.5-1.45-.79-3-.79-4.59s.29-3.14.79-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.55 10.78l7.98-6.19z"/>
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.55 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      </svg>
      Continue with Google
    </button>
    <div style="font-size:11px;color:#c0bbb4;margin-top:32px;line-height:1.7">
      Your habits are private by default.<br>No card required.
    </div>
  </div>`;

      document.getElementById('signin-btn').addEventListener('click', async () => {
        const btn = document.getElementById('signin-btn');
        btn.textContent = 'Opening Google…';
        btn.disabled = true;
        try {
          // Always use popup. signInWithRedirect loses app context in Android standalone PWAs.
          await signInWithPopup(auth, provider);
        } catch (e) {
          console.error('Sign-in error:', e);
          btn.textContent = 'Try again';
          btn.disabled = false;
        }
      });
    }

    // ── BOOT APP ──────────────────────────────────────────────────
    async function bootApp(user) {
      // Initialize DB service early so even if profile save fails, other reads can be attempted
      if (HG.db) {
        HG.db.uid = user.uid;
        HG.db.init();
      }

      // Fetch or create user profile in Firestore
      try {
        const ref = doc(db, 'users', user.uid);
        const snap = await getDoc(ref);
        let profile;
        if (snap.exists()) {
          profile = snap.data();
        } else {
          profile = {
            uid: user.uid,
            name: user.displayName || 'Habit Grower',
            email: user.email || '',
            photoURL: user.photoURL || null,
            handle: '@' + (user.email?.split('@')[0] || 'user'),
            city: 'Pune', country: 'India',
            bio: 'Building good habits 🌱', quote: '',
            peers: 0, following: 0, followers: 0, trybes: 0,
            stats: { daysDone: 0, bestStreak: 0, consistency: 0, plants: 0, avgStreak: 0, weeksActive: 0 },
            createdAt: serverTimestamp()
          };
          await setDoc(ref, profile);
        }

        // Fetch real data
        const habits = await HG.db.fetchHabits();
        const plants = await HG.db.fetchPlants();
        const feed = await HG.db.fetchFeed();

        // Override mock data with fetched real data
        HG.data.habits = habits || [];
        HG.data.plants = plants || {};

        // Clear auth screen, show app
        document.getElementById('auth-wrap').innerHTML = '';
        document.getElementById('main-app').style.display = 'flex';

        // Boot screens
        init();

        // If no habits, trigger onboarding
        if (habits.length === 0) {
          // Give a slight delay for UI to paint
          setTimeout(() => {
            if (HG.screens.onboarding) HG.screens.onboarding.open();
          }, 300);
        }

      } catch (e) {
        console.warn('Firestore error (continuing with defaults):', e);
        HG.data.user.name = user.displayName || 'Habit Grower';
        HG.data.user.handle = '@' + (user.email?.split('@')[0] || 'user');

        // Clear auth screen, show app
        document.getElementById('auth-wrap').innerHTML = '';
        document.getElementById('main-app').style.display = 'flex';
        init();
      }
    }

    // ── AUTH STATE LISTENER ───────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // User is signed in
        const appVisible = document.getElementById('main-app').style.display !== 'none';
        if (!appVisible) await bootApp(user);
      } else {
        // User is signed out — show auth screen
        showAuthScreen();
      }
    });
  </script>

</body>

</html>
